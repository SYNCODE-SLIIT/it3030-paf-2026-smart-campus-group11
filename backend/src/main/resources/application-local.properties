spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/smartcampus}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:smartcampus}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:smartcampus}
app.auth.delivery.mode=supabase
app.security.jwt.local-secret=smart-campus-local-hs256-secret-for-smoke-tests-only
spring.flyway.ignore-migration-patterns=*:future,versioned:missing
spring.flyway.out-of-order=true
spring.flyway.validate-on-migrate=false
app.bootstrap.admin.email=local.admin@smartcampus.local
app.bootstrap.admin.full-name=Local Admin
